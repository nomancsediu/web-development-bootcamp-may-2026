services:
  user:
    build:
      context: ./backend/user
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 5000:5000
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - CHAT_SERVICE=${CHAT_SERVICE}
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:5000/health
      timeout: 10s
      retries: 3
      start_period: 40s
      interval: 30s
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.alapon-vmoms6-2-web.rule=Host(`user.abdnoman.com`)
      - traefik.http.routers.alapon-vmoms6-2-web.entrypoints=web
      - traefik.http.services.alapon-vmoms6-2-web.loadbalancer.server.port=5000
      - traefik.http.routers.alapon-vmoms6-2-web.service=alapon-vmoms6-2-web
      - traefik.http.routers.alapon-vmoms6-2-web.middlewares=redirect-to-https@file
      - traefik.http.routers.alapon-vmoms6-2-websecure.rule=Host(`user.abdnoman.com`)
      - traefik.http.routers.alapon-vmoms6-2-websecure.entrypoints=websecure
      - traefik.http.services.alapon-vmoms6-2-websecure.loadbalancer.server.port=5000
      - traefik.http.routers.alapon-vmoms6-2-websecure.service=alapon-vmoms6-2-websecure
      - traefik.http.routers.alapon-vmoms6-2-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default
  chat:
    build:
      context: ./backend/chat
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 5002:5002
    environment:
      - PORT=5002
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - USER_SERVICE=${USER_SERVICE}
    depends_on:
      - user
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:5002/health
      timeout: 10s
      retries: 3
      start_period: 40s
      interval: 30s
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.alapon-vmoms6-3-web.rule=Host(`chat.abdnoman.com`)
      - traefik.http.routers.alapon-vmoms6-3-web.entrypoints=web
      - traefik.http.services.alapon-vmoms6-3-web.loadbalancer.server.port=5002
      - traefik.http.routers.alapon-vmoms6-3-web.service=alapon-vmoms6-3-web
      - traefik.http.routers.alapon-vmoms6-3-web.middlewares=redirect-to-https@file
      - traefik.http.routers.alapon-vmoms6-3-websecure.rule=Host(`chat.abdnoman.com`)
      - traefik.http.routers.alapon-vmoms6-3-websecure.entrypoints=websecure
      - traefik.http.services.alapon-vmoms6-3-websecure.loadbalancer.server.port=5002
      - traefik.http.routers.alapon-vmoms6-3-websecure.service=alapon-vmoms6-3-websecure
      - traefik.http.routers.alapon-vmoms6-3-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default
  mail:
    build:
      context: ./backend/mail
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 5003:5003
    environment:
      - PORT=5003
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:5003/health
      timeout: 10s
      retries: 3
      start_period: 40s
      interval: 30s
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_USER_SERVICE: ${NEXT_PUBLIC_USER_SERVICE}
        NEXT_PUBLIC_CHAT_SERVICE: ${NEXT_PUBLIC_CHAT_SERVICE}
    restart: unless-stopped
    ports:
      - 8080:3000
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_USER_SERVICE=${NEXT_PUBLIC_USER_SERVICE}
      - NEXT_PUBLIC_CHAT_SERVICE=${NEXT_PUBLIC_CHAT_SERVICE}
    depends_on:
      - user
      - chat
    healthcheck:
      test:
        - CMD
        - wget
        - --no-verbose
        - --tries=1
        - --spider
        - http://localhost:3000
      timeout: 10s
      retries: 3
      start_period: 40s
      interval: 30s
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.alapon-vmoms6-1-web.rule=Host(`alapon.abdnoman.com`)
      - traefik.http.routers.alapon-vmoms6-1-web.entrypoints=web
      - traefik.http.services.alapon-vmoms6-1-web.loadbalancer.server.port=8080
      - traefik.http.routers.alapon-vmoms6-1-web.service=alapon-vmoms6-1-web
      - traefik.http.routers.alapon-vmoms6-1-web.middlewares=redirect-to-https@file
      - traefik.http.routers.alapon-vmoms6-1-websecure.rule=Host(`alapon.abdnoman.com`)
      - traefik.http.routers.alapon-vmoms6-1-websecure.entrypoints=websecure
      - traefik.http.services.alapon-vmoms6-1-websecure.loadbalancer.server.port=8080
      - traefik.http.routers.alapon-vmoms6-1-websecure.service=alapon-vmoms6-1-websecure
      - traefik.http.routers.alapon-vmoms6-1-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default
networks:
  dokploy-network:
    external: true